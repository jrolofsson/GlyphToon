name: Publish Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            global.json
            GlyphTone.slnx
            Directory.Build.props
            GlyphTone.Encoder/GlyphTone.Encoder.csproj
            GlyphTone.Encoder.Tests/GlyphTone.Encoder.Tests.csproj

      - name: Derive package version from tag
        shell: bash
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore GlyphTone.slnx

      - name: Build
        run: dotnet build GlyphTone.slnx -c Release --no-restore --nologo

      - name: Test
        run: dotnet test GlyphTone.slnx -c Release --no-build --nologo

      - name: Pack
        run: >
          dotnet pack GlyphTone.Encoder/GlyphTone.Encoder.csproj
          -c Release
          --no-build
          --nologo
          -p:ContinuousIntegrationBuild=true
          -p:Version=${{ env.PACKAGE_VERSION }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlyphTone.Encoder-${{ env.PACKAGE_VERSION }}-nupkg
          path: GlyphTone.Encoder/bin/Release/*.nupkg

      - name: Publish to GitHub Packages
        run: >
          dotnet nuget push "GlyphTone.Encoder/bin/Release/*.nupkg"
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --api-key "${{ secrets.GITHUB_TOKEN }}"
          --skip-duplicate
