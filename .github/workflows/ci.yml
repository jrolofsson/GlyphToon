name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            global.json
            GlyphTone.slnx
            Directory.Build.props
            GlyphTone.Encoder/GlyphTone.Encoder.csproj
            GlyphTone.Encoder.Tests/GlyphTone.Encoder.Tests.csproj

      - name: Restore
        run: dotnet restore GlyphTone.slnx

      - name: Build
        run: dotnet build GlyphTone.slnx -c Release --no-restore --nologo

      - name: Test
        run: dotnet test GlyphTone.slnx -c Release --no-build --nologo

      - name: Pack
        run: dotnet pack GlyphTone.Encoder/GlyphTone.Encoder.csproj -c Release --no-build --nologo

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlyphTone.Encoder-nupkg
          path: GlyphTone.Encoder/bin/Release/*.nupkg
